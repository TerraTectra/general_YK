name: Frantic Inspect

on:
  push:
    branches:
      - automation/bounty-scan
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Frantic pages and API descriptions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          ua='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36'
          for id in 107 109 114; do
            curl -L --fail --silent --show-error --retry 3 -A "$ua" \
              -D "out/${id}.headers.txt" \
              "https://gofrantic.com/bounties/${id}" \
              -o "out/${id}.html"
          done

          curl -L --fail --silent --show-error --retry 3 -A "$ua" \
            https://gofrantic.com/openapi.json -o out/openapi.json
          curl -L --fail --silent --show-error --retry 3 -A "$ua" \
            https://api.gofrantic.com/mcp.json -o out/mcp.json
          curl -L --fail --silent --show-error --retry 3 -A "$ua" \
            https://gofrantic.com/_astro/SiteHeader.astro_astro_type_script_index_0_lang.DT_cmltw.js \
            -o out/site.js
          curl -L --fail --silent --show-error --retry 3 -A "$ua" \
            https://gofrantic.com/ledger.json -o out/ledger.json

          echo 'OpenAPI routes:'
          jq -r '.paths | keys[]' out/openapi.json | grep -Ei 'claim|deliver|auth|bount|worker|session' || true
          echo 'Client endpoints:'
          grep -Eo '/v1/[A-Za-z0-9_?&=./{}:-]+' out/site.js | sort -u || true

      - name: Upload pages
        uses: actions/upload-artifact@v4
        with:
          name: frantic-pages
          path: out
          retention-days: 1
