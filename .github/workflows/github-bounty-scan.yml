name: GitHub Bounty Scan

on:
  push:
    branches:
      - automation/bounty-scan
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Search fresh public bounty issues
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          queries=(
            'is:issue is:open label:bounty created:>=2026-01-01'
            'is:issue is:open label:"💰 bounty" created:>=2026-01-01'
            'is:issue is:open in:title "bounty" "$" updated:>=2026-05-01'
          )

          : > out/raw.jsonl
          for q in "${queries[@]}"; do
            echo "Searching: $q"
            gh api -X GET /search/issues \
              -f q="$q" \
              -f sort=updated \
              -f order=desc \
              -f per_page=100 \
              --jq '.items[]?' >> out/raw.jsonl || true
          done

          if [[ ! -s out/raw.jsonl ]]; then
            echo '[]' > out/candidates.json
          else
            jq -s '
              map(select(type == "object" and .html_url != null))
              | unique_by(.html_url)
              | map(select(.pull_request == null))
              | map({
                  url: .html_url,
                  repository_url: .repository_url,
                  number: .number,
                  title: .title,
                  body: (.body // ""),
                  labels: [(.labels // [])[] | .name],
                  comments: (.comments // 0),
                  created_at: .created_at,
                  updated_at: .updated_at,
                  user: .user.login
                })
              | sort_by(.updated_at)
              | reverse
            ' out/raw.jsonl > out/candidates.json
          fi

          echo "Candidates: $(jq length out/candidates.json)"
          jq -r '.[] | "\(.updated_at) | \(.repository_url | split("/")[-2:] | join("/"))#\(.number) | \(.title) | comments=\(.comments)"' out/candidates.json | head -200

      - name: Upload search results
        uses: actions/upload-artifact@v4
        with:
          name: github-bounty-candidates
          path: out/candidates.json
          retention-days: 1
