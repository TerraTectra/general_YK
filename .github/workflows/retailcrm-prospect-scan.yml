name: RetailCRM Prospect Scan

on:
  push:
    branches:
      - automation/bounty-scan
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch RetailCRM partner catalog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          ua='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36'
          for url in \
            'https://www.retailcrm.ru/partnership/partners' \
            'https://www.retailcrm.ru/partnership' \
            'https://www.retailcrm.ru/sitemap.xml'; do
            name=$(printf '%s' "$url" | sha256sum | cut -c1-12)
            curl -L --silent --show-error --retry 3 -A "$ua" -D "out/${name}.headers" "$url" -o "out/${name}.body" || true
            echo "$url -> $(wc -c < "out/${name}.body" 2>/dev/null || echo 0) bytes"
          done

          grep -RhoE 'https?://[^"<> ]+' out/*.body | sed 's/[),;]$//' | sort -u > out/urls.txt || true
          grep -RhoEi '[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}' out/*.body | sort -u > out/emails.txt || true
          grep -RhoE '/partnership/partners/[A-Za-z0-9._~!$&()*+,;=:@%/-]+' out/*.body | sort -u > out/partner-paths.txt || true

          echo 'Partner paths:'
          head -100 out/partner-paths.txt || true
          echo 'Emails:'
          cat out/emails.txt || true

      - name: Upload catalog
        uses: actions/upload-artifact@v4
        with:
          name: retailcrm-prospects
          path: out
          retention-days: 1
